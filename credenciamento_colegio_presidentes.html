<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credenciamento — Colégio de Presidentes OAB/RS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px}
.app{max-width:780px;margin:0 auto;padding:1rem}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e3;overflow:hidden;margin-bottom:1rem}
.tabs{display:flex;border-bottom:1px solid #e5e5e3;background:#fafaf8}
.tab{padding:0.7rem 1.5rem;font-size:13px;font-weight:500;color:#888;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:color .15s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;background:#fff}
.pane{display:none}.pane.active{display:block}

/* header */
.hd{padding:.9rem 1.25rem .75rem;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.hd-title{font-size:15px;font-weight:600;flex:1}
.counters{display:flex;gap:8px;flex-wrap:wrap}
.cnt{background:#f5f5f3;border-radius:8px;padding:5px 12px;font-size:13px;color:#666}
.cnt strong{color:#1a1a1a;font-weight:600}

/* search */
.sr{padding:.65rem 1.25rem;border-bottom:1px solid #e5e5e3;display:flex;gap:8px}
.sr input{flex:1;font-size:14px;padding:0 12px;height:38px;border-radius:8px;border:1px solid #ddd;outline:none;background:#fff;color:#1a1a1a}
.sr input:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.btn-add{height:38px;padding:0 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:#f5f5f3}

/* list */
.list{max-height:520px;overflow-y:auto}
.sb{border-bottom:1px solid #e5e5e3}
.sh{padding:.55rem 1.25rem;background:#fafaf8;display:flex;align-items:center;gap:8px}
.sl{width:24px;height:24px;border-radius:50%;background:#E6F1FB;color:#185FA5;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sl.ext{background:#EEEDFE;color:#534AB7}
.sn{font-size:13px;font-weight:600;flex:1;color:#1a1a1a}
.sbadge{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid #e5e5e3;color:#888}
.sbadge.done{background:#E1F5EE;border-color:#9FE1CB;color:#085041}
.ml{padding:.2rem 1.25rem .45rem}
.mr{display:flex;align-items:center;gap:8px;padding:.45rem 0;border-bottom:1px solid #f0f0ee}
.mr:last-child{border-bottom:none}
.mi{flex:1;min-width:0}
.mn{font-size:13px;color:#1a1a1a}
.mn.chk{text-decoration:line-through;color:#aaa}
.pill{display:inline-block;font-size:11px;padding:1px 7px;border-radius:6px;margin-top:2px}
.cp{background:#E6F1FB;color:#0C447C}
.cv{background:#E1F5EE;color:#085041}
.cs{background:#FAEEDA;color:#633806}
.ct{background:#FBEAF0;color:#72243E}
.cr{background:#FAECE7;color:#993C1D;border:1px solid #F0997B}
.cx{background:#EEEDFE;color:#3C3489}
.co{background:#f5f5f3;color:#666}
.ra{display:flex;gap:5px;flex-shrink:0}
.btn{height:28px;padding:0 10px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer}
.btn:hover{background:#f5f5f3}
.btn.bp{min-width:76px}
.btn.done{background:#E1F5EE;border-color:#9FE1CB;color:#085041}
.btn.ic{padding:0;width:28px;display:flex;align-items:center;justify-content:center}
.er{padding:.45rem 0;border-bottom:1px solid #f0f0ee}
.er:last-child{border-bottom:none}
.ef{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ef input{font-size:12px;height:30px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;padding:0 8px;outline:none;flex:1;min-width:120px}
.ef input:focus{border-color:#378ADD}
.tag-w{font-size:10px;padding:1px 5px;border-radius:4px;background:#FAEEDA;color:#633806;border:1px solid #FAC775;margin-left:4px}
.tag-r{font-size:10px;padding:1px 5px;border-radius:4px;background:#FAECE7;color:#993C1D;border:1px solid #F0997B;margin-left:4px}
.tag-e{font-size:10px;padding:1px 5px;border-radius:4px;background:#EEEDFE;color:#3C3489;border:1px solid #AFA9EC;margin-left:4px}

/* cerimonial */
.ch{padding:.9rem 1.25rem .75rem;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.live{font-size:11px;padding:3px 10px;border-radius:6px;background:#E1F5EE;color:#085041;border:1px solid #9FE1CB}
.leg{padding:.5rem 1.25rem;border-bottom:1px solid #e5e5e3;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cl{padding:.5rem 1.25rem 1rem;max-height:520px;overflow-y:auto}
.cc{display:flex;align-items:center;gap:12px;padding:.65rem .9rem;border-radius:8px;margin-bottom:5px}
.cd{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.cn{font-size:15px;font-weight:600;flex:1;color:#1a1a1a}
.cs2{font-size:11px;color:#888;margin-top:1px}
.cc-cargo{font-size:12px;font-weight:500;padding:2px 10px;border-radius:6px;flex-shrink:0;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}

.cer-filters{padding:.5rem 1.25rem;border-bottom:1px solid #e5e5e3;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.cf{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:500;color:#888;cursor:pointer;user-select:none;transition:all .15s}
.cf .cfd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cf.on{color:#1a1a1a;border-color:currentColor}
.cer-group{margin-bottom:4px}
.cer-group-header{padding:.4rem 0 .3rem;font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #f0f0ee;margin-bottom:4px}
/* sync */
.sync{padding:.35rem 1.25rem;font-size:11px;color:#aaa;border-top:1px solid #e5e5e3;display:flex;gap:6px;align-items:center}
.sd{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.sd.ok{background:#1D9E75}
.sd.sy{background:#EF9F27}
.sd.er{background:#E24B4A}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #e5e5e3;padding:1.4rem;width:370px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select{width:100%;font-size:13px;height:36px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;padding:0 10px;outline:none}
.modal input:focus,.modal select:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.mnote{font-size:11px;color:#aaa;margin-top:4px}
.ma{display:flex;gap:8px;margin-top:1.2rem}
.ma button{flex:1;height:36px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #ddd;cursor:pointer}
.mc{background:#fff;color:#888}
.mk{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5}
.tr{display:flex;gap:6px;margin-top:4px}
.tb{flex:1;height:30px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;font-weight:500}
.tb.ac{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5}

/* status */
.status-bar{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:.6rem 1rem;font-size:13px;color:#633806;margin-bottom:1rem;display:none}
.status-bar.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="status-bar" id="status-bar"></div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-op" onclick="switchTab('op')">Credenciamento</button>
      <button class="tab" id="tab-cer" onclick="switchTab('cer')">Cerimonial</button>
    </div>

    <!-- ABA CREDENCIAMENTO -->
    <div class="pane active" id="pane-op">
      <div class="hd">
        <div class="hd-title">Colégio de Presidentes — OAB/RS</div>
        <div class="counters">
          <div class="cnt">Presentes: <strong id="cnt-p">0</strong></div>
          <div class="cnt">Total: <strong id="cnt-t">0</strong></div>
        </div>
      </div>
      <div class="sr">
        <input type="text" id="search" placeholder="Buscar por nome, subseção ou cargo..." autocomplete="off" spellcheck="false">
        <button class="btn-add" onclick="openModal()">+ Adicionar</button>
      </div>
      <div class="list" id="list-area"><div style="padding:2rem;text-align:center;color:#aaa;font-size:14px">Conectando ao banco de dados...</div></div>
    </div>

    <!-- ABA CERIMONIAL -->
    <div class="pane" id="pane-cer">
      <div class="ch">
        <div class="hd-title" style="font-size:15px">Presentes no evento</div>
        <div class="cnt">Total: <strong id="cer-cnt">0</strong></div>
        <div class="live">ao vivo</div>
      </div>
      <div class="cer-filters" id="cer-filters">
        <span style="font-size:11px;color:#aaa;margin-right:4px;flex-shrink:0">Mostrar:</span>
      </div>
      <div class="cl" id="cer-list"><div style="padding:2.5rem;text-align:center;color:#aaa;font-size:14px">Nenhuma presença registrada ainda.</div></div>
    </div>

    <div class="sync">
      <div class="sd" id="sd"></div>
      <span id="ss">Conectando...</span>
      <span style="flex:1"></span>
      <span id="st"></span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Adicionar pessoa</h3>
    <label>Tipo de participante</label>
    <div class="tr">
      <button class="tb ac" id="tipo-sub" onclick="setTipo('sub')">Subseção</button>
      <button class="tb" id="tipo-ext" onclick="setTipo('ext')">Externo(a) / Convidado(a)</button>
    </div>
    <label>Nome completo</label>
    <input type="text" id="m-nome" placeholder="Nome da pessoa" autocomplete="off">
    <div id="bloco-sub">
      <label>Subseção</label>
      <select id="m-sub"></select>
    </div>
    <div id="bloco-ext" style="display:none">
      <label>Instituição <span style="color:#aaa">(opcional)</span></label>
      <input type="text" id="m-inst" placeholder="ex.: Câmara dos Deputados, OAB Federal..." autocomplete="off">
    </div>
    <label>Cargo</label>
    <select id="m-cargo-sel" onchange="onCargoSel()">
      <option>Presidente(a)</option>
      <option>Representante do(a) Presidente(a)</option>
      <option>Vice-Presidente(a)</option>
      <option>Secretário(a)-Geral</option>
      <option>Secretário(a)-Geral Adjunto(a)</option>
      <option>Tesoureiro(a)</option>
      <option>Conselheiro(a) Federal</option>
      <option>Conselheiro(a) Estadual</option>
      <option>Deputado(a) Federal</option>
      <option>Deputado(a) Estadual</option>
      <option>Senador(a)</option>
      <option>Acompanhante</option>
      <option value="__outro__">Outro — escrever</option>
    </select>
    <input type="text" id="m-cargo-txt" placeholder="Descreva o cargo..." autocomplete="off" style="display:none;margin-top:6px">
    <p class="mnote" id="m-cargo-note" style="display:none">Aparecerá exatamente como digitado no cerimonial.</p>
    <div class="ma">
      <button class="mc" onclick="closeModal()">Cancelar</button>
      <button class="mk" onclick="confirmModal()">Adicionar e registrar</button>
    </div>
  </div>
</div>

const ALL_SUBS = [...new Set(BASE.map(r => r[0]))].sort((a,b) => a.localeCompare(b,"pt-BR"));
const EXT_GROUP = "— Externos / Convidados —";

let state = { checkins:{}, extras:{}, edits:{} };
let editingKey = null;
let activeTab = "op";
let modalTipo = "sub";
let saving = false;

// populate modal select
document.getElementById("m-sub").innerHTML = ALL_SUBS.map(s => `<option>${s}</option>`).join("");

function norm(s){ return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function cargoClass(c){
  const l = c.toLowerCase();
  if(l.includes("representante")) return "cr";
  if(l.includes("presidente")) return "cp";
  if(l.includes("vice")) return "cv";
  if(l.includes("secret")) return "cs";
  if(l.includes("tesoure")) return "ct";
  if(l.includes("conselheiro")||l.includes("deputad")||l.includes("senator")) return "cx";
  return "co";
}

function cargoStyle(c){
  const l = c.toLowerCase();
  if(l.includes("representante")) return {dot:"#993C1D",bg:"#FAECE7",tc:"#993C1D",bc:"#F0997B"};
  if(l.includes("presidente"))    return {dot:"#185FA5",bg:"#E6F1FB",tc:"#185FA5",bc:"#B5D4F4"};
  if(l.includes("vice"))          return {dot:"#0F6E56",bg:"#E1F5EE",tc:"#0F6E56",bc:"#9FE1CB"};
  if(l.includes("secret"))        return {dot:"#854F0B",bg:"#FAEEDA",tc:"#854F0B",bc:"#FAC775"};
  if(l.includes("tesoure"))       return {dot:"#993556",bg:"#FBEAF0",tc:"#993556",bc:"#F4C0D1"};
  if(l.includes("conselheiro")||l.includes("deputad")||l.includes("senator"))
    return {dot:"#534AB7",bg:"#EEEDFE",tc:"#3C3489",bc:"#AFA9EC"};
  return {dot:"#888",bg:"#f5f5f3",tc:"#444",bc:"#ddd"};
}

function buildSubs(){
  const map = {};
  ALL_SUBS.forEach(s => map[s] = []);
  BASE.forEach(([sub,nome,cargo]) => {
    const key = sub+"|||"+nome;
    map[sub].push({key, nome:state.edits[key]||nome, cargo:state.edits[key+"__cargo"]||cargo, sub, extra:false});
  });
  const extList = [];
  Object.entries(state.extras||{}).forEach(([uid, ex]) => {
    const key = "extra|||"+uid+"|||"+(ex.sub||EXT_GROUP);
    if(ex.sub && ex.sub !== EXT_GROUP){
      if(!map[ex.sub]) map[ex.sub] = [];
      map[ex.sub].push({key, nome:ex.nome, cargo:ex.cargo, sub:ex.sub, extra:true, uid});
    } else {
      extList.push({key, nome:ex.nome, cargo:ex.cargo, sub:ex.inst||"", inst:ex.inst||"", extra:true, uid, isExt:true});
    }
  });
  const result = Object.entries(map).filter(([,m]) => m.length > 0).sort((a,b) => a[0].localeCompare(b[0],"pt-BR"));
  if(extList.length) result.push([EXT_GROUP, extList]);
  return result;
}

function renderOp(){
  const q = norm(document.getElementById("search").value.trim());
  const subs = buildSubs();
  let totalP = 0, totalC = 0;
  subs.forEach(([,ms]) => ms.forEach(m => { totalP++; if(state.checkins[m.key]) totalC++; }));
  document.getElementById("cnt-p").textContent = totalC;
  document.getElementById("cnt-t").textContent = totalP;

  const filtered = q ? subs.map(([sub,ms]) => {
    if(norm(sub).includes(q)) return [sub,ms];
    const fm = ms.filter(m => norm(m.nome).includes(q)||norm(m.cargo).includes(q)||(m.inst&&norm(m.inst).includes(q)));
    return fm.length ? [sub,fm] : null;
  }).filter(Boolean) : subs;

  const la = document.getElementById("list-area");
  if(!filtered.length){ la.innerHTML='<div style="padding:2rem;text-align:center;color:#aaa;font-size:14px">Nenhum resultado.</div>'; return; }

  la.innerHTML = filtered.map(([sub,members]) => {
    const allMs = subs.find(([s]) => s===sub)?.[1] || members;
    const chk = allMs.filter(m => state.checkins[m.key]).length;
    const done = chk === allMs.length && allMs.length > 0;
    const isExt = sub === EXT_GROUP;

    const rows = members.map(m => {
      const checked = !!state.checkins[m.key];
      if(editingKey === m.key){
        return `<div class="er"><div class="ef">
          <input type="text" id="edit-nome" value="${m.nome.replace(/"/g,'&quot;')}" placeholder="Nome" autocomplete="off">
          <input type="text" id="edit-cargo" value="${m.cargo.replace(/"/g,'&quot;')}" placeholder="Cargo..." autocomplete="off">
          <button class="btn" style="background:#E6F1FB;border-color:#B5D4F4;color:#185FA5" onclick="saveEdit('${m.key}','${m.extra?m.uid:""}','${!!m.extra}')">Salvar</button>
          <button class="btn" onclick="cancelEdit()">&#x2715;</button>
        </div></div>`;
      }
      const tagW = m.extra&&!m.isExt ? '<span class="tag-w">walk-in</span>' : "";
      const tagE = m.isExt ? '<span class="tag-e">externo(a)</span>' : "";
      const tagR = (!m.extra && m.cargo.toLowerCase().includes("representante")) ? '<span class="tag-r">rep.</span>' : "";
      const instLine = m.inst ? `<br><span style="font-size:11px;color:#aaa">${m.inst}</span>` : "";
      return `<div class="mr">
        <div class="mi">
          <span class="mn${checked?" chk":""}">${m.nome}${tagW}${tagE}${tagR}</span>${instLine}<br>
          <span class="pill ${cargoClass(m.cargo)}">${m.cargo}</span>
        </div>
        <div class="ra">
          <button class="btn bp${checked?" done":""}" onclick="toggle('${m.key}')">${checked?"Presente":"Registrar"}</button>
          <button class="btn ic" onclick="startEdit('${m.key}')">&#9998;</button>
        </div>
      </div>`;
    }).join("");

    return `<div class="sb">
      <div class="sh">
        <div class="sl${isExt?" ext":""}">${isExt?"★":sub.charAt(0)}</div>
        <div class="sn">${sub}</div>
        <div class="sbadge${done?" done":""}">${chk}/${allMs.length}</div>
      </div>
      <div class="ml">${rows}</div>
    </div>`;
  }).join("");
}

const CATS = [
  { id:"presidente",   label:"Presidente(a)",     dot:"#185FA5", match: c => c.toLowerCase().includes("presidente") && !c.toLowerCase().includes("vice") },
  { id:"representante",label:"Representante",      dot:"#993C1D", match: c => c.toLowerCase().includes("representante") },
  { id:"vice",         label:"Vice-Presidente(a)", dot:"#0F6E56", match: c => c.toLowerCase().includes("vice") },
  { id:"secretario",   label:"Secretário(a)",      dot:"#854F0B", match: c => c.toLowerCase().includes("secret") },
  { id:"tesoureiro",   label:"Tesoureiro(a)",      dot:"#993556", match: c => c.toLowerCase().includes("tesoure") },
  { id:"externo",      label:"Externo(a)",         dot:"#534AB7", match: c => c.toLowerCase().includes("conselheiro")||c.toLowerCase().includes("deputad")||c.toLowerCase().includes("senator") },
  { id:"outro",        label:"Outro",              dot:"#888",    match: c => true }
];

let cerFilters = new Set(CATS.map(c => c.id));

function getCat(cargo){
  for(const cat of CATS){ if(cat.match(cargo)) return cat; }
  return CATS[CATS.length-1];
}

function buildCerFilters(){
  const div = document.getElementById("cer-filters");
  div.innerHTML = '<span style="font-size:11px;color:#aaa;margin-right:4px;flex-shrink:0">Mostrar:</span>';
  CATS.forEach(cat => {
    const on = cerFilters.has(cat.id);
    const btn = document.createElement("button");
    btn.className = "cf" + (on ? " on" : "");
    btn.style.borderColor = on ? cat.dot : "#ddd";
    btn.style.color = on ? cat.dot : "#aaa";
    btn.innerHTML = `<span class="cfd" style="background:${on?cat.dot:"#ddd"}"></span>${cat.label}`;
    btn.onclick = () => {
      if(cerFilters.has(cat.id)) cerFilters.delete(cat.id);
      else cerFilters.add(cat.id);
      buildCerFilters();
      renderCer();
    };
    div.appendChild(btn);
  });
}

function renderCer(){
  const subs = buildSubs();
  const list = [];
  subs.forEach(([sub,ms]) => ms.forEach(m => {
    if(state.checkins[m.key]) list.push({...m, subLabel: sub===EXT_GROUP?(m.inst||"Externo(a)"):sub});
  }));

  document.getElementById("cer-cnt").textContent = list.length;
  const cl = document.getElementById("cer-list");
  if(!list.length){ cl.innerHTML='<div style="padding:2.5rem;text-align:center;color:#aaa;font-size:14px">Nenhuma presença registrada ainda.</div>'; return; }

  // agrupar por categoria
  const groups = {};
  CATS.forEach(cat => { groups[cat.id] = []; });
  list.forEach(p => {
    const cat = getCat(p.cargo);
    groups[cat.id].push(p);
  });

  // ordenar dentro de cada grupo por nome
  CATS.forEach(cat => { groups[cat.id].sort((a,b) => a.nome.localeCompare(b.nome,"pt-BR")); });

  let html = "";
  CATS.forEach(cat => {
    if(!cerFilters.has(cat.id)) return;
    const items = groups[cat.id];
    if(!items.length) return;
    const s = cargoStyle(items[0].cargo);
    html += `<div class="cer-group">
      <div class="cer-group-header" style="color:${cat.dot}">${cat.label} (${items.length})</div>
      ${items.map(p => {
        const st = cargoStyle(p.cargo);
        return `<div class="cc" style="background:${st.bg};border:1px solid ${st.bc}">
          <div class="cd" style="background:${st.dot}"></div>
          <div style="flex:1;min-width:0">
            <div class="cn">${p.nome}</div>
            <div class="cs2">${p.subLabel}</div>
          </div>
          <div class="cc-cargo" style="background:${st.bg};color:${st.tc};border:1px solid ${st.bc}">${p.cargo}</div>
        </div>`;
      }).join("")}
    </div>`;
  });

  cl.innerHTML = html || '<div style="padding:2rem;text-align:center;color:#aaa;font-size:14px">Nenhuma categoria selecionada.</div>';
}

function render(){ renderOp(); if(activeTab==="cer") renderCer(); }

function toggle(key){
  state.checkins[key] = !state.checkins[key];
  render();
  saveToFirebase();
}

function startEdit(key){ editingKey = key; renderOp(); }
function cancelEdit(){ editingKey = null; renderOp(); }

function saveEdit(key, uid, isExtra){
  const nome = document.getElementById("edit-nome").value.trim();
  const cargo = document.getElementById("edit-cargo").value.trim();
  if(!nome) return;
  if(isExtra==="true"){
    if(state.extras[uid]){
      state.extras[uid].nome = nome;
      if(cargo) state.extras[uid].cargo = cargo;
    }
  } else {
    state.edits[key] = nome;
    if(cargo) state.edits[key+"__cargo"] = cargo;
  }
  editingKey = null;
  render();
  saveToFirebase();
}

function switchTab(t){
  activeTab = t;
  document.getElementById("tab-op").className = "tab"+(t==="op"?" active":"");
  document.getElementById("tab-cer").className = "tab"+(t==="cer"?" active":"");
  document.getElementById("pane-op").className = "pane"+(t==="op"?" active":"");
  document.getElementById("pane-cer").className = "pane"+(t==="cer"?" active":"");
  if(t==="cer"){ buildCerFilters(); renderCer(); }
}

function setTipo(t){
  modalTipo = t;
  document.getElementById("tipo-sub").className = "tb"+(t==="sub"?" ac":"");
  document.getElementById("tipo-ext").className = "tb"+(t==="ext"?" ac":"");
  document.getElementById("bloco-sub").style.display = t==="sub"?"block":"none";
  document.getElementById("bloco-ext").style.display = t==="ext"?"block":"none";
  if(t==="ext"){ document.getElementById("m-cargo-sel").value = "Conselheiro(a) Federal"; onCargoSel(); }
}

function onCargoSel(){
  const v = document.getElementById("m-cargo-sel").value;
  const isO = v === "__outro__";
  document.getElementById("m-cargo-txt").style.display = isO ? "block" : "none";
  document.getElementById("m-cargo-note").style.display = isO ? "block" : "none";
  if(isO) setTimeout(() => document.getElementById("m-cargo-txt").focus(), 50);
}

function openModal(){
  modalTipo = "sub"; setTipo("sub");
  document.getElementById("m-nome").value = "";
  document.getElementById("m-inst").value = "";
  document.getElementById("m-cargo-sel").value = "Presidente(a)";
  document.getElementById("m-cargo-txt").value = "";
  document.getElementById("m-cargo-txt").style.display = "none";
  document.getElementById("m-cargo-note").style.display = "none";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("m-nome").focus(), 50);
}

function closeModal(){ document.getElementById("modal").classList.remove("open"); }

function confirmModal(){
  const nome = document.getElementById("m-nome").value.trim();
  if(!nome) return;
  const sel = document.getElementById("m-cargo-sel").value;
  const cargo = sel==="__outro__" ? (document.getElementById("m-cargo-txt").value.trim()||"Outro") : sel;
  const uid = "x" + Date.now() + Math.floor(Math.random()*9999);
  if(modalTipo==="sub"){
    const sub = document.getElementById("m-sub").value;
    state.extras[uid] = {nome, sub, cargo};
    state.checkins["extra|||"+uid+"|||"+sub] = true;
  } else {
    const inst = document.getElementById("m-inst").value.trim();
    state.extras[uid] = {nome, sub:null, inst, cargo};
    state.checkins["extra|||"+uid+"|||"+EXT_GROUP] = true;
  }
  closeModal(); render(); saveToFirebase();
}

// expose funcs to global scope (called from inline onclick)
window.toggle = toggle;
window.startEdit = startEdit;
window.cancelEdit = cancelEdit;
window.saveEdit = saveEdit;
window.switchTab = switchTab;
window.setTipo = setTipo;
window.onCargoSel = onCargoSel;
window.openModal = openModal;
window.closeModal = closeModal;
window.confirmModal = confirmModal;

document.getElementById("search").addEventListener("input", renderOp);

function setSt(s, msg){
  const dot = document.getElementById("sd");
  const st = document.getElementById("ss");
  const tm = document.getElementById("st");
  dot.className = "sd"+(s==="ok"?" ok":s==="sy"?" sy":s==="er"?" er":"");
  st.textContent = msg || (s==="ok"?"Sincronizado":s==="sy"?"Salvando...":"Erro de conexão");
  if(s==="ok") tm.textContent = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

async function saveToFirebase(){
  if(saving) return;
  saving = true;
  setSt("sy");
  try {
    const payload = {
      checkins: state.checkins || {},
      edits:    state.edits    || {},
      extras:   state.extras   || {}
    };
    await set(dbRef, payload);
    setSt("ok");
  } catch(e){
    const msg = e?.message || e?.code || JSON.stringify(e) || "Erro desconhecido";
    setSt("er", "Erro: " + msg);
    document.getElementById("status-bar").textContent = "ERRO AO SALVAR: " + msg;
    document.getElementById("status-bar").style.display = "block";
    console.error(e);
  }
  saving = false;
}

// listener em tempo real — atualiza todos os dispositivos instantaneamente
onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if(data){
    state.checkins = data.checkins || {};
    state.extras   = data.extras   || {};
    state.edits    = data.edits    || {};
  } else {
    state = { checkins:{}, extras:{}, edits:{} };
  }
  render();
  setSt("ok");
}, (error) => {
  setSt("er");
  console.error(error);
});

</script>
